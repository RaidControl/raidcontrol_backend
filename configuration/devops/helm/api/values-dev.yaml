generic-app:
    name: djv-raidcontrol-backend-dev
    deployEnv: dev

    hpa:
        minReplicas: 1
        maxReplicas: 1

    app:
        resources:
            requests:
                cpu: 100m
                memory: 256M
            limits:
                memory: 512M
        env:
            UPLOAD_DIR: "/app/uploads"
            NEEDS_REVIEW_MIN_CONF: "0.30"
            FINISH_CHECKPOINT_ID: "finish"
            DB_HOST: "10.136.211.90"
            DB_PORT: "3306"
            DB_NAME: "mvp-raidcontrol-backend-dev"
            DB_USER: "mvp-raidcontrol-backend-dev"
            SPACES_ACCESS_KEY: "DO801LJRZRVWTVGVBBPJ"
            SPACES_BUCKET: "djv-raidcontrol-assets-dev"
            SPACES_REGION: "nyc3"
            SPACES_CDN_DOMAIN: "djv-raidcontrol-assets-dev.nyc3.cdn.digitaloceanspaces.com"

    ingress:
        hosts:
            - host: api.dev.vueltaalpartido.com.ar
              paths:
                - path: /
                  pathType: Prefix
        tls:
            - hosts:
                - api.dev.vueltaalpartido.com.ar

    sealedSecrets:
        encryptedData:
            DB_PASSWORD: 
            DEVICE_API_KEY: 
            ADMIN_USERNAME: 
            ADMIN_PASSWORD: 
            JWT_SECRET: 
            SPACES_SECRET_KEY: 
