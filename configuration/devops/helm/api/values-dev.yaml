generic-app:
    name: djv-raidcontrol-backend-dev
    deployEnv: dev

    hpa:
        minReplicas: 1

    app:
        resources:
            requests:
                cpu: 50m
                memory: 128M
            limits:
                memory: 512M
        env:
            UPLOAD_DIR: "/app/uploads"
            NEEDS_REVIEW_MIN_CONF: "0.60"
            FINISH_CHECKPOINT_ID: "finish"
            DB_HOST: "10.136.211.90"
            DB_PORT: "3306"
            DB_NAME: "mvp-raidcontrol-backend-dev"
            DB_USER: "mvp-raidcontrol-backend-dev"

    ingress:
        hosts:
            - api.dev.vueltaalpartido.com.ar

    sealedSecrets:
        encryptedData:
            DB_PASSWORD: 
            DEVICE_API_KEY: 
            ADMIN_USERNAME: 
            ADMIN_PASSWORD: 
            JWT_SECRET: 
