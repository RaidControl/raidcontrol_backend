generic-app:
    name: djv-raidcontrol-backend-prod
    deployEnv: prod

    hpa:
        minReplicas: 2

    app:
        resources:
            requests:
                cpu: 100m
                memory: 256M
            limits:
                memory: 1024M
        env:
            UPLOAD_DIR: "/app/uploads"
            NEEDS_REVIEW_MIN_CONF: "0.60"
            FINISH_CHECKPOINT_ID: "finish"
            DB_HOST: "10.136.211.85"
            DB_PORT: "3306"
            DB_NAME: "mvp-raidcontrol-backend-prod"
            DB_USER: "mvp-raidcontrol-backend-prod"
            SPACES_ACCESS_KEY: "DO801BNWAE3LMT8GQ4H6"
            SPACES_BUCKET: "djv-raidcontrol-assets-prod"
            SPACES_REGION: "nyc3"

    ingress:
        hosts:
            - host: api.vueltaalpartido.com.ar
              paths:
                - path: /
                  pathType: Prefix
        tls:
            - hosts:
                - api.vueltaalpartido.com.ar

    sealedSecrets:
        encryptedData:
            DB_PASSWORD: 
            DEVICE_API_KEY: 
            ADMIN_USERNAME: 
            ADMIN_PASSWORD: 
            JWT_SECRET: 
            SPACES_SECRET_KEY: 
